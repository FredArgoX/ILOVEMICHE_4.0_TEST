<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beverage Haven • Premium Drinks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #4a2c0b;
            --accent: #e67e22;
            --light: #f8f1e3;
            --dark: #2c1f12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #2c1f12 0%, #1a1209 100%);
            color: #f8f1e3;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 4rem 2rem 3rem;
            background: rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            color: #f8f1e3;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.85;
            font-weight: 500;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .beverages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            padding: 2rem 0 4rem;
        }

        .beverage-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            position: relative;
        }

        .beverage-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border-color: var(--accent);
        }

        .card-image {
            height: 240px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent 50%);
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .card-subtitle {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-bottom: 1rem;
        }

        .tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(230, 126, 34, 0.2);
            color: #e67e22;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: #2c1f12;
            max-width: 900px;
            width: 90%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            max-height: 95vh;
        }

        .modal-header {
            padding: 2rem 2.5rem 1.5rem;
            background: linear-gradient(to right, #3a2a18, #4a2c0b);
            position: relative;
        }

        .modal-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #fff;
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.15);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #e67e22;
            transform: rotate(90deg);
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            padding: 2rem 2.5rem;
            gap: 2rem;
            overflow-y: auto;
        }

        .modal-image {
            width: 100%;
            height: 320px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .ingredients {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 16px;
        }

        .ingredients h3, .description h3 {
            color: #e67e22;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .ingredients ul {
            list-style: none;
        }

        .ingredients li {
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ingredients li:before {
            content: '•';
            color: #e67e22;
            font-size: 1.4rem;
        }

        .description {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 16px;
        }

        .modal-footer {
            padding: 1.5rem 2.5rem;
            background: rgba(0,0,0,0.4);
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .order-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .order-btn:hover {
            background: #f39c12;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .modal-info {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2.8rem;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.7) translateY(50px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Beverage Haven</h1>
            <p class="subtitle">Discover the world's finest crafted beverages</p>
        </div>
    </header>

    <div class="container">
        <div class="beverages-grid" id="beveragesGrid">
            <!-- Populated by JavaScript -->
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="beverageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            
            <div class="modal-body">
                <img id="modalImage" class="modal-image" src="" alt="">
                
                <div class="modal-info">
                    <div class="ingredients">
                        <h3>Ingredients</h3>
                        <ul id="modalIngredients"></ul>
                    </div>
                    
                    <div class="description">
                        <h3>Description</h3>
                        <p id="modalDescription"></p>
                    </div>
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="order-btn" id="orderBtn">Order Now • $8.99</button>
            </div>
        </div>
    </div>

    <script>
        // Beverage Database - Best practice: centralized data structure
        const beverages = [
            {
                id: 1,
                name: "Espresso Martini",
                category: "Cocktail",
                image: "https://picsum.photos/id/1015/800/600",
                ingredients: [
                    "2 oz Vodka",
                    "1 oz Fresh Espresso",
                    "0.5 oz Coffee Liqueur",
                    "0.5 oz Simple Syrup",
                    "Coffee Beans (garnish)"
                ],
                description: "A sophisticated blend of rich espresso and smooth vodka, creating the perfect balance of bitter and sweet. This iconic cocktail delivers a bold caffeine kick with luxurious velvety texture."
            },
            {
                id: 2,
                name: "Matcha Latte",
                category: "Non-Alcoholic",
                image: "https://picsum.photos/id/201/800/600",
                ingredients: [
                    "2 tsp Ceremonial Matcha",
                    "8 oz Steamed Milk",
                    "1 oz Vanilla Syrup",
                    "Hot Water (to bloom matcha)",
                    "Cinnamon Dusting"
                ],
                description: "Vibrant Japanese green tea powder whisked to perfection and combined with creamy steamed milk. Earthy, slightly sweet, and packed with antioxidants."
            },
            {
                id: 3,
                name: "Mango Passionfruit Mojito",
                category: "Cocktail",
                image: "https://picsum.photos/id/292/800/600",
                ingredients: [
                    "2 oz White Rum",
                    "Fresh Mango Puree",
                    "Passionfruit Pulp",
                    "Fresh Mint Leaves",
                    "Lime Juice",
                    "Soda Water"
                ],
                description: "Tropical paradise in a glass. Sweet mango and tart passionfruit mingle with refreshing mint and lime for a vibrant, thirst-quenching experience."
            },
            {
                id: 4,
                name: "Golden Turmeric Latte",
                category: "Non-Alcoholic",
                image: "https://picsum.photos/id/431/800/600",
                ingredients: [
                    "1 tsp Turmeric Powder",
                    "8 oz Warm Oat Milk",
                    "1/2 tsp Ground Ginger",
                    "Pinch of Black Pepper",
                    "1 tbsp Honey",
                    "Cinnamon Stick"
                ],
                description: "A warm, soothing anti-inflammatory drink with earthy turmeric and aromatic spices. Perfect for relaxation and wellness."
            },
            {
                id: 5,
                name: "Smoky Old Fashioned",
                category: "Cocktail",
                image: "https://picsum.photos/id/106/800/600",
                ingredients: [
                    "2 oz Bourbon",
                    "0.25 oz Maple Syrup",
                    "2 dashes Angostura Bitters",
                    "Orange Peel",
                    "Smoked Ice Cube",
                    "Luxardo Cherry"
                ],
                description: "A timeless classic with a modern smoky twist. Rich bourbon, subtle sweetness, and citrus notes create an elegant and complex sipping experience."
            }
        ];

        // DOM Elements
        const grid = document.getElementById('beveragesGrid');
        const modal = document.getElementById('beverageModal');
        const closeBtn = document.getElementById('closeModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalImage = document.getElementById('modalImage');
        const modalIngredients = document.getElementById('modalIngredients');
        const modalDescription = document.getElementById('modalDescription');

        // Render beverage cards
        function renderBeverages() {
            grid.innerHTML = '';

            beverages.forEach(beverage => {
                const card = document.createElement('div');
                card.className = 'beverage-card';
                card.innerHTML = `
                    <div class="card-image" style="background-image: url('${beverage.image}')"></div>
                    <div class="card-content">
                        <div class="card-subtitle">${beverage.category}</div>
                        <div class="card-title">${beverage.name}</div>
                        <div class="tags">
                            <span class="tag">${beverage.category}</span>
                        </div>
                    </div>
                `;
                
                // Click handler for each card (best practice: event delegation possible but individual handlers are fine here)
                card.addEventListener('click', () => showBeverageModal(beverage));
                
                grid.appendChild(card);
            });
        }

        // Show modal with dynamic content
        function showBeverageModal(beverage) {
            modalTitle.textContent = beverage.name;
            modalImage.src = beverage.image;
            modalImage.alt = beverage.name;
            modalDescription.textContent = beverage.description;

            // Populate ingredients dynamically
            modalIngredients.innerHTML = '';
            beverage.ingredients.forEach(ingredient => {
                const li = document.createElement('li');
                li.textContent = ingredient;
                modalIngredients.appendChild(li);
            });

            modal.style.display = 'flex';
            
            // Accessibility: trap focus and prevent background scroll
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Event Listeners
        function setupEventListeners() {
            closeBtn.addEventListener('click', closeModal);

            // Close modal when clicking outside content
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });

            // Keyboard support (ESC key)
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.style.display === 'flex') {
                    closeModal();
                }
            });

            // Fake order button action
            document.getElementById('orderBtn').addEventListener('click', () => {
                const title = modalTitle.textContent;
                alert(`✅ Order placed for ${title}!\n\nThank you for choosing Beverage Haven. Your drink will be ready shortly.`);
                closeModal();
            });
        }

        // Initialize the application
        function init() {
            renderBeverages();
            setupEventListeners();
            
            // Optional: Add some micro-interactions
            console.log('%c🍹 Beverage Haven initialized successfully!', 'color: #e67e22; font-weight: bold;');
        }

        // Run initialization when DOM is fully loaded
        window.addEventListener('load', init);
    </script>
</body>
</html>
